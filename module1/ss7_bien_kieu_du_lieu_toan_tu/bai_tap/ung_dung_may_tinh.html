<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ỨNG DỤNG MÁY TÍNH</title>
</head>
    <style>
        tr td {
            border: 1px solid cadetblue;
            border-collapse: collapse;
            width: 100px;
            height: 70px;
            background-color: cadetblue;
        }
        p {
            color: yellow;
            text-align: center;
        }
    </style>
<body>
    <h2>Máy Tính!</h2>
    <input type="text" id="so_dau"> <input type="text" id="so_hai"><br>
    <br>
    <button type="button" onclick="cong()">CỘNG</button>
    <button type="button" onclick="tru()">TRỪ</button>
    <button type="button" onclick="nhan()">NHÂN</button>
    <button type="button" onclick="chia()">CHIA</button><br>
    <br>
    <br>
    <h3>Kết Quả:</h3>
    <table>
        <tr>
            <td><p id="kq"></p></td>
        </tr>
    </table>
</body>
    <script>
        function cong() {
            let a = parseInt(document.getElementById("so_dau").value);
            let b = parseInt(document.getElementById("so_hai").value);
            let d = document.getElementById("kq").value;
            let c;
            if (a>=0){
                c = a + b;
            }
            document.getElementById("kq").innerText =  c;
        }
        function tru() {
            let a = parseInt(document.getElementById("so_dau").value);
            let b = parseInt(document.getElementById("so_hai").value);
            let d = document.getElementById("kq").value;
            let c;
            if (a>=0){
                c = a - b;
            }
            document.getElementById("kq").innerText =  c;
        }
        function nhan() {
            let a = parseInt(document.getElementById("so_dau").value);
            let b = parseInt(document.getElementById("so_hai").value);
            let d = document.getElementById("kq").value;
            let c;
            if (a>=0){
                c = a * b;
            }
            document.getElementById("kq").innerText =  c;
        }
        function chia() {
            let a = parseInt(document.getElementById("so_dau").value);
            let b = parseInt(document.getElementById("so_hai").value);
            let d = document.getElementById("kq").value;
            let c;
            if (a>=0){
                c = a / b;
            }
            document.getElementById("kq").innerText =  c;
        }

    </script>
</html>
