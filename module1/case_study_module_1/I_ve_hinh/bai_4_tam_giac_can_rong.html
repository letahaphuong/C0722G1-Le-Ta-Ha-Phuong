<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let chieuCao = +prompt('Nhập chiều cao H:');
    let text = '';
    for (let i = 0; i < chieuCao; i++) {
        for (let j = chieuCao; j <= chieuCao; j++) {
            if (i === chieuCao ) {
                text += '*';
            }else {
                text+='&nbsp&nbsp'
            }
        }
    }
    document.write(text)
</script>
</body>
</html>
