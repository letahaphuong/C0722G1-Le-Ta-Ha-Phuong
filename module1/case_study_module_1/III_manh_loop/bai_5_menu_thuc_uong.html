<script>
    let text='';

        do {

                    document.getElementById('hienThi').value =text+ '8000';
                    break;
                case 6:
                    text = document.getElementById('hienThi').value;
                    document.getElementById('hienThi').value =text+ '20000';

            }
        }while (num==7)
    }

    function soLuong() {

    text1=document.getElementById('hienThi').value;
