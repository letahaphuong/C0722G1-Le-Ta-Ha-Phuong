<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<style>
    canvas {
        background-color: white;
        border-collapse: collapse;
        border: black solid 1px;
    }
</style>
<body>
<canvas id="hinhChuNhat" height="500px" width="500px"></canvas>
<script>
    // var canvas = document.getElementById('hinhChuNhat')

    class HinhChuNhat {//lớp
        constructor(width, height) { //Xây dựng thuộc tính
            this.width = width;
            this.height = height;
        }

        tinhDienTich() { //khai báo hành vi(là khai baso hàm)
            return this.width * this.height;
        }

        tinhChuVi() {  //khai báo hành vi(là khai baso hàm)
            return (this.width + this.height) * 2;
        }

        veHinhChuNhat() { //khai báo hành vi(là khai baso hàm)
            document.getElementById('hinhChuNhat').getContext('2d').fillRect(0, 0, this.height, this.width);
            document.getElementById('hinhChuNhat').getContext('2d').strokeRect(0, 0, this.height, this.width);
            // document.getElementById('hinhChuNhat').getContext('2d').clearRect(0, 0, this.height, this.width);
        }
    }

    let hcn = new HinhChuNhat(50, 100); //khởi tạo đối tượng mới truyền đối tượng
    alert(hcn.tinhDienTich()+'\n'+hcn.tinhChuVi());
    hcn.veHinhChuNhat(); //hành vi của đối tượng
</script>
</body>
</html>
