<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h3>Kiểm tra số ngày trong tháng</h3>
    <table>
        <tr>
            <td>
                <select id="select" style="width: 100px; text-align: center">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                    <option>11</option>
                    <option>12</option>
                </select>
            </td>
            <td><input type="submit" value="Check" onclick="kiemTra()"></td>
        </tr>
    </table>
    <p id="ketQua"></p>
</body>
<script>
    function kiemTra() {
        let selected = parseInt(document.getElementById("select").value);
        switch (selected) {
                // break;
            case 1: "Tháng có 31 ngày";
            case 4: "Tháng có 31 ngày";
            case 6: "Tháng có 31 ngày";
            case 8: "Tháng có 31 ngày";
            case 10: "Tháng có 31 ngày";
            case 12: "Tháng có 31 ngày";
            document.getElementById("ketQua").innerText= "Tháng:" + selected + 'là tháng có 31 ngày';
            break;
            case 2: "Tháng có 29 ngày";
            document.getElementById("ketQua").innerText= "Tháng:" + selected + 'là thàng có 29 ngay';
            break;
            case 3: "Tháng có 30 ngày";
            case 5: "Tháng có 30 ngày";
            case 7: "Tháng có 30 ngày";
            case 9: "Tháng có 30 ngày";
            case 11: "Tháng có 30 ngày";
            document.getElementById("ketQua").innerText="Tháng:" + selected + 'là tháng có 30 ngày';
        }


    }
</script>
</html>
