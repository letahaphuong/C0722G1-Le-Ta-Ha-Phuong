<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function truyenThamSo(mang) {
        let a = 0;
        let b = 1;
        let text = '';
        let arr = [];
        let arr1 = [0];

        for (let i = 0; i < 7; i++) {
            let c = b + a;
            a = b;
            b = c;
            text = c;
            arr.push(text);
        }

        for (let i = 0; i < mang.length; i++) {
            for (let j = 0; j < arr.length; j++) {
                if (arr[j] === mang[i]) {
                    arr1.push(arr[j]);
                }
            }
        }

        return arr1;

    }


    let mangTruyen = [1, 5, 6, 13, 9, 12, 8, 0, 5, 1];
    alert(truyenThamSo(mangTruyen).sort(function (a, b) {
        return a - b;
    }));


</script>
</body>
</html>
