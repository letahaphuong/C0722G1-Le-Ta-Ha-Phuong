<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Furama-Danh sach customer</title>
    <link rel="stylesheet" href="/static/css/mystyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
          crossorigin="anonymous">

</head>
<body>

<div class="vh-100 vw-100">
    <div class="row text-center"
         style="height: 75%">
        <div class="row ">
            <div class="col-lg-1">
                <button class="btn btn-outline-success mt-5" type="submit" onclick="location.href='/customer'">Back
                </button>
            </div>
            <div class="col-lg-10">

                <div class="row m-5">
                    <div class="container register-form">
                        <div class="form">
                            <div class="note align-items-center d-flex justify-content-center">
                                <h2>CREATE CUSTOMER</h2>
                            </div>
                            <p if="${mess != null}" text="${mess}" style="color: blue">
                                <form action="@{/customer/save}" object="${customer}" method="post">
                                    <div class="form-content">
                                        <div class="row">
                                            <div class="col-md-6">
                                                <div hidden class="form-group">
                                                    <label hidden>Id</label>
                                                    <input hidden class="form-control" name="id"
                                                           placeholder="CUSTOMER ID *"
                                                    />
                                                </div>
                                                <div class="form-group">
                                                    <label>Customer Type Name</label>
                                                    <select name="customerType" class="form-select"
                                                            aria-label="Default select example"
                                                            value="${customerTypeId}"
                                                            style="border-radius: 30px">
                                                        <option VALUE="">--Choose Customer Type--</option>
                                                        <option value="1">Diamond</option>
                                                        <option value="2">Platinum</option>
                                                        <option value="3">Gold</option>
                                                        <option value="4">Silver</option>
                                                    </select>
                                                </div>
                                                <br>
                                                <div class="form-group">
                                                    <label for="name">Name</label>
                                                    <input required id="name" style="border-radius: 30px"
                                                           class="form-control" type="text"
                                                          />
                        </div>
                        <br>
                        <div class="form-group">
                            <label for="dateOfBirth">Date Of Birth</label>
                            <input required id="dateOfBirth" style="border-radius: 30px" class="form-control"
                                   type="date"
                                 />

                        </div>
                        <br>
                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select required id="gender" class="form-control form-select"
                                    aria-label="Default select example"
                                    style="border-radius: 30px">
                                <option VALUE="">--Choose Gender--</option>
                                <option value="0">Female</option>
                                <option value="1">Male</option>
                            </select>
                        </div>
                        <br>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="idCard">Id Card</label>
                            <input required id="idCard" style="border-radius: 30px" class="form-control" type="text"
                                  />
                        </div>
                        <br>
                        <div class="form-group">
                            <label for="phoneNumber">Phone Number</label>
                            <input required id="phoneNumber" style="border-radius: 30px" class="form-control"
                                   type="text"
                                  />
                        </div>
                        <br>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input required id="email" style="border-radius: 30px" class="form-control" type="email"
                                   />
                        </div>
                        <br>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input required id="address" style="border-radius: 30px" class="form-control" type="text"
                                   />
                        </div>
                    </div>
                </div>
                <br>
                <button type="submit" class="btn btn-outline-success">Submit</button>
            </div>
            </form>

        </div>
    </div>

</div>

<div></div>

</div>
<div class="col-lg-1"></div>
</div>

</div>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
<script>
    function idRemove(id) {
        document.getElementById("idInput").value = id;
    }
</script>
</html>
