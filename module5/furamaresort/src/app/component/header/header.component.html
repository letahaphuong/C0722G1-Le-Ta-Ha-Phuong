      </svg>
      <p style="font-size: 13px">84-236-3847 333/888</p>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"

  <div class="d-flex justify-content-center align-items-center pe-5 m">
    <div class="col-9 text-end" >

    </div>
    <button style="width: 60px;height: 35px" type="button" class="btn btn-outline-success my-4"
            data-bs-toggle="modal"
            data-bs-target="#exampleModalLogin">login
    </button>
    <button style="width: 60px;height: 35px" type="button" class="btn btn-outline-success my-4"
            data-bs-toggle="modal"
            data-bs-target="#logout">logout
    </button>

  </div>
  <!-- LOGIN -->
  <div class="modal fade" id="exampleModalLogin" tabindex="-1" aria-labelledby="exampleModalLabelLogin"
       aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header" style="background: -webkit-linear-gradient(left, #046056, #ffffff)">
          <h5 class="modal-title text-white" id="exampleModalLabelLogin">Furama Danang</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row m-5">
            <div class="container register-form">
              <div class="row">
                <div class="row">
                  <div class="col-md-6">
                    <div class="d-flex justify-content-center">
                      <button type="button" class="btn btn-outline-success my-5 "
                              data-bs-toggle="modal" data-bs-target="#exampleModalLogin"
                              style="height: 60px;width: 170px">login
                      </button>
                    </div>

                  </div>
                  <div class="col-md-6 align-items-center">
                    <div class="d-flex justify-content-center">
                      <button type="button" class="btn btn-outline-success my-5"
                              data-bs-toggle="modal" data-bs-target="#exampleModalRegister"
                              style="height: 60px;width: 170px">register
                      </button>
                    </div>

                  </div>

                </div>
                <div class="form-content">
                  <div class="row">
                    <div class="col-md-3"></div>
                    <div class="col-md-6">
                      <form name='f' action="@{/}" method="post">
                        <div>
                          <div class="form-group">
                            <input type="text" class="form-control"
                                   name="username" placeholder="Username *" value=""/>
                          </div>
                          <br>
                          <div class="form-group">
                            <input type="password" class="form-control"
                                   placeholder="Your password *"
                                   name="password" value=""/>
                          </div>
                          <br>
                          <div class="form-check d-flex justify-content-around">
                            <div>
                              <input name="remember-me" class="form-check-input"
                                     type="checkbox" value="" id="form2Example31" checked/>
                              <label class="form-check-label" for="form2Example31"> Remember me </label>
                            </div>

                            <div class="text-success">
                              <!-- Simple link -->
                              <a href="#!">Forgot password?</a>
                            </div>
                          </div>
                          <br>
                        </div>
                        <div class="row d-flex">
                        </div>
                        <div class="modal-footer">
                          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Close
                          </button>
                          <button type="submit" class="btn btn-success">SIGN IN</button>
                        </div>
                      </form>
                    </div>
                    <div class="col-md-3"></div>
                  </div>
                  <br>
                </div>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
  <!-- Register -->
  <div class="modal fade" id="exampleModalRegister" tabindex="-1" aria-labelledby="exampleModalLabelRegister"
       aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header" style="background: -webkit-linear-gradient(left, #046056, #ffffff)">
          <h5 class="modal-title text-white" id="exampleModalLabelRegister">Furama Danang</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row m-5">
            <div class="container register-form">
              <div class="row">
                <div class="row">
                  <div class="col-md-6">
                    <div class="d-flex justify-content-center">
                      <button type="button" class="btn btn-outline-success my-5 "
                              data-bs-toggle="modal" data-bs-target="#exampleModalLogin"
                              style="height: 60px;width: 170px">login
                      </button>
                    </div>

                  </div>
                  <div class="col-md-6 align-items-center">
                    <div class="d-flex justify-content-center">
                      <button type="button" class="btn btn-outline-success my-5"
                              data-bs-toggle="modal" data-bs-target="#exampleModalRegister"
                              style="height: 60px;width: 170px">register
                      </button>
                    </div>

                  </div>

                </div>

                <div class="form-content">
                  <div class="row">
                    <div class="col-md-3"></div>
                    <div class="col-md-6">
                      <div class="form-group">
                        <input type="text" class="form-control" placeholder="Your Name *" value=""/>
                      </div>
                      <br>
                      <div class="form-group">
                        <input type="text" class="form-control" placeholder="Your Email, Username *"
                               value=""/>
                      </div>
                      <br>
                      <div class="form-group">
                        <input type="text" class="form-control" placeholder="Password *" value=""/>
                      </div>
                      <br>
                      <br>
                      <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                          Close
                        </button>
                        <button type="button" class="btn btn-success">SIGN UP</button>
                      </div>
                    </div>
                    <div class="col-md-3"></div>
                    <br>
                  </div>
                </div>
              </div>

            </div>
          </div>
          <!--            <div class="modal-footer">-->
          <!--                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>-->
          <!--                <button type="button" class="btn btn-success">Save changes</button>-->
          <!--            </div>-->
        </div>
      </div>
    </div>
  </div>
  <!-- Notification LOG OUT-->
  <div class="modal fade" id="logout" tabindex="-1" aria-labelledby="exampleModalLabelLogOut"
       aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-success" style="background: -webkit-linear-gradient(left, #046056, #ffffff)">
          <h5 class="modal-title text-white" id="exampleModalLabelLogOut">Facility</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <p class="mt-2 ms-3">Are you sure to log-out?</p>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <form action="@{/logout}" method="post">
            <button type="submit" class="btn btn-success" id="liveToastBtn">Keep Log-Out</button>
          </form>
        </div>
      </div>
    </div>

  </div>
</header>
