<div class="vh-100 vw-100">
  <div class="row text-center"
       style="height: 75%">
    <div class="row ">
      <div class="col-lg-1">
        <button class="btn btn-outline-success mt-5" type="submit" onclick="location.href='/customer'">Back
        </button>
      </div>
      <div class="col-lg-10">

        <div class="row m-5">
          <div class="container register-form">
            <div class="form">
              <div class="note align-items-center d-flex justify-content-center">
                <h2>CREATE CUSTOMER</h2>
              </div>
              <p if="${mess != null}" text="${mess}" style="color: blue">
              <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
                <div class="form-content">
                  <div class="row">
                    <div class="col-md-6">
                      <div class="form-group">
                        <label for="id">Id</label>
                        <input style="border-radius:30px" class="form-control" id="id" name="id"
                               placeholder="CUSTOMER ID *" formControlName="id"
                        />
                        <br>
                      </div>
                      <div class="form-group">
                        <label for="customerType" >Customer Type Name</label>
                        <select  class="form-select" name="customerType" id="customerType"  formControlName="customerType"
                                 style="border-radius: 30px">
                          <option [ngValue]="null" [defaultSelected]="true">--Choicse country--</option>
                          <option *ngFor="let i of customerTypes" [ngValue]="i">{{i.name}}</option>
                        </select>

                      </div>
                      <br>
                      <div class="form-group">
                        <label for="customerCode">Customer Code</label>
                        <input id="customerCode" style="border-radius: 30px" name="customerCode"
                               formControlName="customerCode"
                               class="form-control" type="text"
                        />
                      </div>
                      <div>
                        <div *ngIf="contactForm.controls.customerCode.errors?.required && (contactForm.controls.customerCode?.dirty || contactForm.controls.customerCode?.touched)">
                          <span style="color: red">Customer code is not required</span>
                        </div>
                        <div *ngIf="contactForm.controls.customerCode.errors?.pattern">
                          <span style="color: red">
                            Customer code is not formater
                          </span>
                        </div>
                      </div>
                      <br>
                      <div class="form-group">
                        <label for="name">Name</label>
                        <input id="name" style="border-radius: 30px" name="name" formControlName="name"
                               class="form-control" type="text"
                        />
                      </div>
                      <div>
                        <div *ngIf="contactForm.controls.name.errors?.required && (contactForm.controls.name?.dirty || contactForm.controls.name?.touched)">
                          <span style="color: red">Name is not required</span>
                        </div>
                        <div *ngIf="contactForm.controls.name.errors?.pattern">
                          <span style="color: red">
                            Name is not formater
                          </span>
                        </div>
                      </div>
                      <br>
                      <div class="form-group">
                        <label for="dateOfBirth">Date Of Birth</label>
                        <input id="dateOfBirth" style="border-radius: 30px"
                               class="form-control"
                               type="date" name="dateOfBirth" formControlName="dateOfBirth"
                        />
                      </div>
                      <br>
                      <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" class=" form-select"
                                name="gender" formControlName="gender"
                                style="border-radius: 30px">
                          <option [ngValue]="null" [selected]="true">--Choose Gender--</option>
                          <option [ngValue]="0">Female</option>
                          <option [ngValue]="1">Male</option>
                        </select>
                      </div>
                      <br>
                    </div>
                    <div class="col-md-6">
                      <div class="form-group">
                        <label for="idCard">Id Card</label>
                        <input id="idCard" style="border-radius: 30px" name="idCard"
                               class="form-control" type="text" formControlName="idCard"
                        />
                      </div>
                      <div>
                        <div *ngIf="contactForm.controls.idCard.errors?.required && (contactForm.controls.idCard?.dirty || contactForm.controls.idCard?.touched)">
                          <span style="color: red">Id card is not required</span>
                        </div>
                        <div *ngIf="contactForm.controls.idCard.errors?.pattern">
                          <span style="color: red">
                            Id card is not formater
                          </span>
                        </div>
                      </div>
                      <br>
                      <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input id="phoneNumber" style="border-radius: 30px"
                               class="form-control" name="phoneNumber" formControlName="phoneNumber"
                               type="text"
                        />
                      </div>
                      <div
                        *ngIf="!contactForm.controls.phoneNumber?.valid && (contactForm.controls.phoneNumber?.valid || contactForm.controls.phoneNumber?.touched)">
                        <!--                                                                        <span style="color: red"> phone number code is not valid</span>-->
                        <div [hidden]="!contactForm.controls.phoneNumber.errors?.required">
                          <span style="color: red">
                            Phone number is not required
                          </span>
                        </div>
                        <div [hidden]="!contactForm.controls.phoneNumber.errors?.pattern">
                          <span style="color: red">
                            Phone number is not formater
                          </span>
                        </div>
                      </div>
                      <br>
                      <div class="form-group">
                        <label for="email">Email</label>
                        <input required id="email" style="border-radius: 30px"
                               class="form-control" type="email" name="email" formControlName="email"
                        />
                      </div>
                      <div
                        *ngIf="!contactForm.controls.email?.valid && (contactForm.controls.email?.valid || contactForm.controls.email?.touched)">
                        <div [hidden]="!contactForm.controls.email.errors?.required">
                            <span style="color: red">
                              Email is not required
                            </span>
                        </div>
                        <div [hidden]="!contactForm.controls.email.errors?.pattern">
                            <span style="color: red">
                              Email is not formater
                            </span>
                        </div>
                      </div>
                      <br>
                      <div class="form-group">
                        <label for="address">Address</label>
                        <input id="address" style="border-radius: 30px" name="address"
                               class="form-control" type="text" formControlName="address"
                        />
                      </div>
                    </div>
                  </div>
                  <br>
                  <button [disabled]="!contactForm.valid" type="submit" class="btn btn-outline-success">Submit</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-1"></div>
    </div>
  </div>
</div>
