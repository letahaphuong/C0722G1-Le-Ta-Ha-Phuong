<p>dictionary-list works!</p>
<table>
  <tr>
    <th>STT</th>
    <th>WORD</th>
    <th>DETAIL</th>
  </tr>
  <tr *ngFor="let item of iWordShow;index as i">
    <td>{{i+1}}</td>
    <td><a>{{item.word}}</a></td>
    <td><button [routerLink]="['/dic/detail',item.word,item.mean]">chi tiết</button></td>
  </tr>
</table>
