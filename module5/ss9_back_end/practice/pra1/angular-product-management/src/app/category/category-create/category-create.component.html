<h1>Tạo danh mục mới</h1>
<button class="btn btn-danger" routerLink="/category/list">Trở lại</button>
<form [formGroup]="categoryForm" (ngSubmit)="create()">
  <table>
    <tr>
      <td>Mã danh mục:</td>
      <td><input type="number" formControlName="id"></td>
    </tr>
    <tr>
      <td>Tên danh mục:</td>
      <td><input type="text" formControlName="name"></td>
    </tr>
    <tr>
      <td></td>
      <td><button>Tạo mới</button></td>
    </tr>
  </table>
</form>
