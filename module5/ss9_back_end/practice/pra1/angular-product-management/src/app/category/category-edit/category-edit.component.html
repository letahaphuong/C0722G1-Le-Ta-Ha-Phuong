<h1>Cập nhật thông tin danh mục sản phẩm</h1>
<button class="btn btn-success" routerLink="/category/list">trở lại</button>
<form [formGroup]="categoryForm" (ngSubmit)="edit()">
  <table>
    <tr>
      <td>Mã danh mục:</td>
      <td><input type="number" name="id" formControlName="id"></td>
    </tr>
    <tr>
      <td>Tên danh mục:</td>
      <td><input type="text" name="name" formControlName="name"></td>
    </tr>
    <tr>
      <td></td>
      <td><button class="btn bg-primary" type="submit">Cập nhật</button></td>
    </tr>
  </table>
</form>
