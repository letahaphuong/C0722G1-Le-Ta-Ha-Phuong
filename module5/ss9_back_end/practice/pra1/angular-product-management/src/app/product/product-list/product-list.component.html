<p>danh sách sản phẩm!</p>
<a class="btn bg-primary" routerLink="/product/create">tạo mới</a>
<table class="table table-hover table-striped">
  <thead>
  <tr>
    <th>STT</th>
    <th>Tên</th>
    <th>Giá</th>
    <th>Mô Tả</th>
    <th>Chỉnh sửa</th>
    <th>Xoá</th>
  </tr>
  </thead>
  <tbody>
  <tr *ngFor="let item of products; index as i">
    <td>{{i + 1}}</td>
    <td>{{item.name}}</td>
    <td>{{item.price}}</td>
    <td>{{item.description}}</td>
    <td>
      <button [routerLink]="['/product/edit',item.id]" class="btn bg-primary">Sửa</button>
    </td>
    <td>
      <button (click)="temp = item"  class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#exampleModal">Xoá</button>
    </td>
  </tr>
  </tbody>
</table>
<app-product-delete [product]="temp"></app-product-delete>
