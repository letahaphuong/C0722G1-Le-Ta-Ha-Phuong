<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head ><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous"></head>
<body>
<div th:insert="~{layout::header}"></div>
<h3>Edit product</h3>
<p>
    <a th:href="@{/room}">
        Back to product list
    </a>
</p>
<p th:if="${mess}" style="color: blue">
</p>
<div id="form">
    <form action="#" th:action="@{/room/update}" th:object="${roomForRent}"
          method="POST" novalidate="novalidate">
        <input type="hidden" th:field="*{roomId}"/>
        <div>
            <label>Tên Khách Hàng</label>
            <input type="text" th:field="*{customerName}"/>
        </div>
        <div>
            <label>Số Điện Thoai</label>
            <input type="text" th:field="*{phoneNumber}"/>
        </div>
        <div>
            <label>Ngày Bắt Đầu Thuê</label>
            <input type="date" th:field="*{startDate}"/>
        </div>
        <div>
            <label>Ghi Chú</label>
            <textarea th:type="text" th:field="*{note}"></textarea>
        </div>
        <div>
            <label>Hình Thức Thanh Toán</label>
<!--            <select th:field="*{payment}">-->
<!--               <option th:each="i : ${payment}" th:value="${i}" th:text="${i}"-->
<!--               th:selected="${i==payment.id}"></option>-->
<!--            </select>-->
            <select th:field="*{payment.id}">
                <option th:each="i : ${roomForRent}" th:value="${i}" th:utext="${i}"
                    th:selected="${i==roomForRent.payment.id}" ></option>
            </select>
        </div>
        <input type="submit" value="Edit"/>
    </form>
</div>
<div th:insert="~{layout::footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
