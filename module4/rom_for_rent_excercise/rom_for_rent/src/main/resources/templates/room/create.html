<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div th:insert="~{layout::header}"></div>
<h3>Thêm Khách Hàng</h3>
<p>
    <a th:href="@{/room}">
        Trở về danh sách
    </a>
</p>
<div>
        <p style="color: blue" th:text="${mess}"></p>
</div>
<div id="form">
    <form th:action="@{/room/save}" th:object="${roomForRent}"
          method="post" novalidate="novalidate">
        <input type="hidden" th:field="*{roomId}"/>
        <div>
            <label>Tên Khách Hàng</label>
            <input type="text" th:field="*{customerName}"/>
        </div>
        <div>
            <label>Số Điện Thoại</label>
            <input type="text" th:field="*{phoneNumber}"/>
        </div>
        <div>
            <label>Ngày Bắt Đầu Thuê</label>
            <input type="date" th:field="*{startDate}"/>
        </div>
        <div>
            <label>Ghi Chú</label>
            <input type="text" th:field="*{note}"/>
        </div>
        <div>
            <label>Hình Thức Thanh Toán</label>
            <select th:field="*{payment.id}">
                <option th:value="1" th:text="'Theo Năm'"></option>
                <option th:value="2" th:text="'Theo Quý'">Theo Quý</option>
                <option th:value="3" th:text="'Theo Tháng'">Theo Tháng</option>
            </select>
<!--            <input type="text" th:field="*{payment}"/>-->
        </div>
        <input type="submit" value="Save"/>
    </form>
</div>
<div th:insert="~{layout::footer}"></div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</html>
