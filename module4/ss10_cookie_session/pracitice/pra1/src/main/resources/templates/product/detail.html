<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/js/bootstrap.bundle.min.js">
</head>
<body>
    <div class="container">
        <a href="/shop" class="btn btn-success">Back Home</a>
        <div class="card mb-3">
            <div class="row g-0">
                <img style="width: 100%" th:src="@{${product.img}}" class="img-fluid rounded-start">
            </div>
            <div class="col-md-8 ">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}"></h5>
                    <p class="card-text" th:text="${product.description}"></p>
                    <strong class="card-text" th:text="${product.price}"></strong>
                    <p class="card-text"><small class="text-muted"> Last Update 3 mins ago</small></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
