<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="stylesheet" href="/static/css/mystyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
          crossorigin="anonymous">

</head>
<body>

<div class="vh-100 vw-100">
    <section class="vh-00 bg-image"
             style="background-image: url('https://nhadatdanang.com/wp-content/uploads/2021/10/tranh-truu-tuong-w120cmxh60cm-vda-0001-thumnail-2.jpg');">
        <div class="mask d-flex align-items-center h-100 gradient-custom-3" >
            <div class="container h-100">
                <div class="row d-flex justify-content-center align-items-center h-80">
                    <div class="col-12 col-md-9 col-lg-7 col-xl-6">
                        <div class="col-lg-1">
                            <button class="btn btn-outline-danger mt-5" type="submit" onclick="location.href='/question'">Back
                            </button>
                        </div>
                        <div class="card" style="border-radius: 15px;">
                            <div class="card-body p-5">
                                <h2 class="text-center mb-5">THÊM MỚI </h2>
                                <p th:if="${mess != null}" th:text="${mess}" style="color: blue">
                                <form th:action="@{/question/save}" th:object="${questionContent}" method="post">
                                    <div class="form-outline mb-4">
                                        <span>Tiêu Đề</span>
                                        <input type="text" th:field="*{title}" class="form-control form-control-lg"/>
<!--                                        <p th:errors="*{title}" class="text-danger"></p>-->
                                    </div>
                                    <div class="form-outline mb-4">
                                        <label class="form-label">Nội Dung </label>
                                        <input type="text" th:field="*{content}" class="form-control form-control-lg"/>
<!--                                        <p th:errors="*{content}" style="color: red"></p>-->
                                    </div>
                                    <div class="form-outline mb-4">
                                        <span>Loại câu hỏi:</span>
                                        <select th:field="*{questionType}" class="form-select"
                                                aria-label="Default select example">
                                            <option th:each="questionType:${questionTypeList}"
                                                    th:value="${questionType.id}"
                                                    th:text="${questionType.questionTypeName}">
                                            </option>
                                        </select>
                                    </div>
                                    <div class="d-flex justify-content-center">
                                        <button type="submit"
                                                class="btn btn-outline-success btn-block btn-lg gradient-custom-4 text-body">Thêm mới
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</div>

<div></div>

</div>
<div class="col-lg-1"></div>
</div>

</div>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</html>
