<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Furama-Danh sach customer</title>
    <link rel="stylesheet" href="/static/css/mystyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
          crossorigin="anonymous">

</head>
<body>

<div class="vh-100 vw-100">
    <div class="row text-center"
         style="height: 75%">
        <div class="row ">
            <div class="col-lg-1">
                <button class="btn btn-outline-danger mt-5" type="submit" onclick="location.href='/question'">Back
                </button>
            </div>
            <div class="col-lg-10">

                <div class="row m-5">
                    <div class="container register-form">
                        <div class="form">
                            <div class="note align-items-center d-flex justify-content-center">
                                <h2>SỬA </h2>
                            </div>
                            <form th:action="@{/question/update}" th:object="${questionContent}" method="post">
                                <div class="form-content">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label hidden>Id</label>
                                                <input hidden class="form-control" name="id" placeholder="CUSTOMER ID *"
                                                       th:field="*{id}"/>
                                            </div>
                                            <div class="form-group">
                                                <label>Tiêu Đề</label>
                                                <input readonly  style="border-radius: 30px" class="form-control" type="text"
                                                       th:field="*{title}"/>
                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label>Nội dung</label>
                                                <input readonly style="border-radius: 30px" class="form-control" type="text"
                                                       th:field="*{content}"/>
                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label>Phản hồi</label>
                                                <input  style="border-radius: 30px" class="form-control" type="text"
                                                       th:field="*{answer}"/>
                                            </div>
                                            <br>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label>Loại câu hỏi</label>
                                                <!--                                    <input readonly style="border-radius: 30px" class="form-control" type="text"-->
                                                <!--                                           th:field="*{questionType}"/>-->
                                                <select readonly  th:field="*{questionType}" class="form-select"
                                                        aria-label="Default select example">
                                                    <option th:each="questionType:${questionTypeList}"
                                                            th:value="${questionType.id}"
                                                            th:text="${questionType.questionTypeName}">
                                                    </option>
                                                </select>
                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label>Ngày Đăng</label>
                                                <input  style="border-radius: 30px" class="form-control" type="text"
                                                       th:field="*{dateCreate}"/>


                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label>Tình trạng</label>
                                                <input  style="border-radius: 30px" class="form-control" type="email"
                                                       th:field="*{status}"/>
                                            </div>
                                            <br>
                                        </div>
                                    </div>
                                    <br>
                                    <button type="submit" class="btn btn-outline-success">Submit</button>
                                </div>
                            </form>

                        </div>
                    </div>

                </div>

                <div></div>

            </div>
            <div class="col-lg-1"></div>
        </div>

    </div>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>

</html>
