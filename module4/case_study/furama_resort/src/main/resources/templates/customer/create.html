<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Furama-Danh sach customer</title>
    <link rel="stylesheet" href="/static/css/mystyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
          crossorigin="anonymous">

</head>
<body>

<div class="vh-100 vw-100">
    <div th:insert="~{home::header}"></div>
    <div class="row sticky-top" style="height: 5%">
        <nav class="navbar navbar-expand-lg " style="background-color: #046056">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item ">
                            <a class="nav-link active text-white" aria-current="page" href="#"
                               style="color: #0000008c ">Home</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-white" href="#" id="navbarEmployee" role="button"
                               data-bs-toggle="dropdown" aria-expanded="false">
                                Employee
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarEmployee">
                                <li><a class="dropdown-item" href="#">Management</a></li>
                                <li><a class="dropdown-item" href="#">Staff</a></li>
                                <li><a class="dropdown-item" href="#">Show All</a></li>
                            </ul>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-white" href="#" id="navbarCustomer" role="button"
                               data-bs-toggle="dropdown" aria-expanded="false">
                                Customer
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarCustomer">
                                <li><a class="dropdown-item" href="#">Diamond</a></li>
                                <li><a class="dropdown-item" href="#">Platinium</a></li>
                                <li><a class="dropdown-item" href="#">Gold</a></li>
                                <li><a class="dropdown-item" href="#">Silver</a></li>
                                <li><a class="dropdown-item" href="#">Member</a></li>

                            </ul>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-white" href="#" id="navbarService" role="button"
                               data-bs-toggle="dropdown" aria-expanded="false">
                                Service
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarService">
                                <li><a class="dropdown-item" href="#">Villa</a></li>
                                <li><a class="dropdown-item" href="#">House</a></li>
                                <li><a class="dropdown-item" href="#">Room</a></li>
                            </ul>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-white" href="#" id="navbarContract" role="button"
                               data-bs-toggle="dropdown" aria-expanded="false">
                                Contract
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarContract">
                                <li><a class="dropdown-item" href="#">Action</a></li>
                                <li><a class="dropdown-item" href="#">Another action</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#">Something else here</a></li>
                            </ul>
                        </li>
                    </ul>
                    <form class="d-flex col-xxl-2 col-xl-2 col-lg-3 col-md-3 col-sm-3 ">
                        <input class="form-control me-2" type="search" placeholder="Search name and address"
                               aria-label="Search">
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>

                </div>
            </div>
        </nav>
    </div>
    <div class="row text-center"
         style="height: 75%">
        <div class="row ">
            <div class="col-lg-1">
                <button class="btn btn-outline-primary mt-5" type="submit" onclick="location.href='/customer'">Back
                </button>
            </div>
            <div class="col-lg-10">

                <div class="row m-5">
                    <div class="container register-form">
                        <div class="form">
                            <div class="note align-items-center d-flex justify-content-center">
                                <h2>CREATE CUSTOMER</h2>
                            </div>
                            <p th:if="${mess != null}" th:text="${mess}" style="color: blue">
                            <form th:action="@{/customer/save}" th:object="${customer}" method="post">
                                <div class="form-content">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div hidden class="form-group">
                                                <label hidden>Id</label>
                                                <input hidden class="form-control" name="id" placeholder="CUSTOMER ID *"
                                                       th:field="*{id}"/>
                                            </div>
                                            <div class="form-group">
                                                <label for="customerType">Customer Type Name</label>
                                                <select required id="customerType" th:field="*{customerType}" class="form-select"
                                                        aria-label="Default select example"
                                                        style="border-radius: 30px">
                                                    <option th:each="customerType : ${customerTypes}"
                                                            th:value="${customerType.id}"
                                                            th:text="${customerType.name}">
                                                    </option>
                                                </select>
                                                <p th:errors = "*{customerType}" class="text-danger"></p>
                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label for="name">Name</label>
                                                <input required id="name" style="border-radius: 30px" class="form-control" type="text"
                                                       th:field="*{name}"/>
                                                <p th:errors = "*{name}" class="text-danger"></p>
                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label for="dateOfBirth">Date Of Birth</label>
                                                <input required id="dateOfBirth" style="border-radius: 30px" class="form-control" type="date"
                                                       th:field="*{dateOfBirth}"/>
                                                <p th:errors = "*{dateOfBirth}" style="color: red"></p>
                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label for="gender">Gender</label>
                                                <select required id="gender" class="form-control form-select"
                                                        aria-label="Default select example"
                                                        style="border-radius: 30px" th:field="*{gender}">
                                                    <option th:value="0" >Nữ</option>
                                                    <option th:value="1" >Nam</option>
                                                </select>
                                                <p th:errors = "*{gender}" style="color: red"></p>

                                            </div>
                                            <br>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label for="idCard">Id Card</label>
                                                <input required id="idCard" style="border-radius: 30px" class="form-control" type="text"
                                                       th:field="*{idCard}"/>
                                                <p th:errors = "*{idCard}" class="text-danger"></p>
                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label for="phoneNumber">Phone Number</label>
                                                <input required id="phoneNumber" style="border-radius: 30px" class="form-control" type="text"
                                                       th:field="*{phoneNumber}"/>
                                                <p th:errors = "*{phoneNumber}" class="text-danger"></p>

                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label for="email">Email</label>
                                                <input required id="email" style="border-radius: 30px" class="form-control" type="email"
                                                       th:field="*{email}"/>
                                                <p th:errors = "*{email}" class="text-danger"></p>
                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label for="address">Address</label>
                                                <input required id="address" style="border-radius: 30px" class="form-control" type="text"
                                                       th:field="*{address}"/>
                                                <p th:errors = "*{address}" class="text-danger" ></p>
                                            </div>
                                        </div>
                                    </div>
                                    <br>
                                    <button type="submit" class="btn btn-outline-success">Submit</button>
                                </div>
                            </form>

                        </div>
                    </div>

                </div>

                <div></div>

            </div>
            <div class="col-lg-1"></div>
        </div>

    </div>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
<script>var toastTrigger = document.getElementById('liveToastBtn')
var toastLiveExample = document.getElementById('liveToast')
if (toastTrigger) {
    toastTrigger.addEventListener('click', function () {
        var toast = new bootstrap.Toast(toastLiveExample)

        toast.show()
    })
}</script>
<script>
    function idRemove(id) {
        document.getElementById("idInput").value = id;
    }
</script>
</html>
