<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<style>
    .gradient-custom-3 {
        /* fallback for old browsers */
        background: #84fab0;

        /* Chrome 10-25, Safari 5.1-6 */
        background: -webkit-linear-gradient(to right, rgba(132, 250, 176, 0.5), rgba(143, 211, 244, 0.5));

        /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
        background: linear-gradient(to right, rgba(132, 250, 176, 0.5), rgba(143, 211, 244, 0.5))
    }

    .gradient-custom-4 {
        /* fallback for old browsers */
        background: #84fab0;

        /* Chrome 10-25, Safari 5.1-6 */
        background: -webkit-linear-gradient(to right, rgba(132, 250, 176, 1), rgba(143, 211, 244, 1));

        /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
        background: linear-gradient(to right, rgba(132, 250, 176, 1), rgba(143, 211, 244, 1))
    }
</style>
<body>
<h3>Edit product</h3>
<p>
    <a th:href="@{/blog}">
        Back to product list
    </a>
</p>
<p th:if="${mess}" style="color: blue">
</p>
<div id="form1">
    <form th:object="${blog}"
          method="POST" novalidate="novalidate">
        <section class="vh-100 bg-image"
                 style="background-image: url('https://mdbcdn.b-cdn.net/img/Photos/new-templates/search-box/img4.webp');">
            <div class="mask d-flex align-items-center h-100 gradient-custom-3">
                <div class="container h-100">
                    <div class="row d-flex justify-content-center align-items-center h-100">
                        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
                            <div class="card" style="border-radius: 15px;">
                                <div class="card-body p-5">
                                    <h2 class="text-uppercase text-center mb-5">Blog</h2>

                                    <form>
                                        <div hidden class="form-outline mb-4">
                                            <label class="form-label" for="id">Blog Name</label>
                                            <input type="text" id="id"
                                                   class="form-control form-control-lg" th:field="*{id}"/>
                                        </div>
                                        <div class="form-outline mb-4">
                                            <label class="form-label" for="name">Blog Name</label>
                                            <input readonly type="text" id="name"
                                                   class="form-control form-control-lg" th:field="*{name}"/>
                                        </div>
                                        <div class="form-outline mb-4">
                                            <label class="form-label" for="contentBlog">Blog Content</label>
                                            <textarea readonly type="text" id="contentBlog" class="form-control form-control-lg"
                                                      th:field="*{contentBlog}"></textarea>
                                        </div>

                                        <div class="form-outline mb-4">
                                            <label class="form-label" for="producerBlog">Producer Blog</label>

                                            <input readonly th:type="text" id="producerBlog" class="form-control form-control-lg"
                                                   th:field="*{producerBlog}"/>
                                        </div>

                                        <div class="form-outline mb-4">
                                            <label class="form-label" for="form44">Date Create</label>
                                            <input readonly type="text" id="form44"
                                                   class="form-control form-control-lg" th:field="*{dateCreate}"/>
                                        </div>

                                    </form>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
