<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Furama-Danh sach khach hang</title>
    <!--    <link rel="stylesheet" href="/bootstrap/css/bootstrap.css">-->
    <link rel="stylesheet" href="customer/mystyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<body>

<div class="vh-100 vw-100">
    <div class="row text-center align-items-end" style="height: 10%">
        <div class="col-lg-4"></div>
        <div class="col-lg-4"><h3 class="mb-4">XEM CHI TIẾT</h3></div>
        <div class="col-lg-4">
            <form   class="d-flex align-items-start col-xxl-2 col-xl-2 col-lg-3 col-md-3 col-sm-3 mb-4">
                <!--                <button class="btn btn-outline-success" type="button" >-->
                <!--                    + Add-->
                <!--                </button>-->
                <a th:href="@{/customer }" class="btn btn-outline-success">Back</a>
            </form>

        </div>

    </div>
    <div class="row">
        <div class="col-lg-2">
        </div>
        <div class="col-lg-8" style="border-top: 2px solid black">
            <div>
                <form th:object="${customer}">
                    <div class="form-content">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group" >
                                    <label>Id</label>
                                    <input style="border-radius: 30px" disabled class="form-control" name="id" placeholder="CUSTOMER ID *"
                                           th:field="*{id}"/>
                                </div>
                                <br>
                                <div class="form-group">
                                    <label>Customer Type Name</label>
                                    <select disabled="true" th:field="*{customerType}" class="form-select"
                                            aria-label="Default select example"
                                            style="border-radius: 30px">
                                        <option th:each="customerType : ${customerTypes}"
                                                th:value="${customerType.id}"
                                                th:text="${customerType.name}">
                                        </option>
                                    </select>
                                </div>
                                <br>
                                <div class="form-group">
                                    <label>Name</label>
                                    <input disabled style="border-radius: 30px" class="form-control" type="text"
                                           th:field="*{name}"/>
                                </div>
                                <br>
                                <div class="form-group">
                                    <label>Date Of Birth</label>
                                    <input disabled style="border-radius: 30px" class="form-control" type="date"
                                           th:field="*{dateOfBirth}"/>
                                </div>
                                <br>
                                <div class="form-group">
                                    <label>Gender</label>
                                    <select disabled="true" name="gender" class="form-control form-select"
                                            aria-label="Default select example"
                                            style="border-radius: 30px" th:field="*{gender}">
                                        <option readonly th:value="0" th:text="Female"></option>
                                        <option readonly th:value="1" th:text="Male"></option>
                                    </select>
                                </div>
                                <br>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Id Card</label>
                                    <input readonly style="border-radius: 30px" class="form-control" type="text"
                                           th:field="*{idCard}"/>

                                </div>
                                <br>
                                <div class="form-group">
                                    <label>Phone Number</label>
                                    <input disabled style="border-radius: 30px" class="form-control" type="text"
                                           th:field="*{phoneNumber}"/>

                                </div>
                                <br>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input disabled style="border-radius: 30px" class="form-control" type="email"
                                           th:field="*{email}"/>
                                </div>
                                <br>
                                <div class="form-group">
                                    <label>Address</label>
                                    <input disabled style="border-radius: 30px" class="form-control" type="text"
                                           th:field="*{address}"/>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>
    <div class="col-lg-2"></div>
</div>


</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</html>
