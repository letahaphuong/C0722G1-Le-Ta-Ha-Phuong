<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Furama-Danh sach customer</title>
    <link rel="stylesheet" href="/static/css/mystyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
          crossorigin="anonymous">

</head>
<body>

<div class="vh-100 vw-100">
    <div class="row text-center"
         style="height: 75%">
        <div class="row ">
            <div class="col-lg-1">
                <button class="btn btn-outline-danger mt-5" type="submit" onclick="location.href='/hokhau'">Back
                </button>
            </div>
            <div class="col-lg-10">

                <div class="row m-5">
                    <div class="container register-form">
                        <div class="form">
                            <div class="note align-items-center d-flex justify-content-center">
                                <h2>SỬA </h2>
                            </div>
                            <form th:action="@{/hokhau/update}" th:object="${hoKhau}" method="post">
                                <div class="form-content">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label hidden>Id</label>
                                                <input hidden class="form-control" name="id" placeholder="CUSTOMER ID *"
                                                       th:field="*{id}"/>
                                            </div>
                                            <div class="form-group">
                                                <label for="maHoKhau">Mã Hộ Khẩu</label>
                                                <input readonly id="maHoKhau" style="border-radius: 30px" class="form-control"
                                                       type="text"
                                                       th:field="*{maHoKhau}"/>
                                                <p th:errors="*{maHoKhau}" style="color: red"></p>
                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label th:for="tenChuHo">Tên chỉ hộ</label>
                                                <input required style="border-radius: 30px" class="form-control"
                                                       type="text"
                                                       th:field="*{tenChuHo}"/>
                                                <p th:errors="*{tenChuHo}" style="color: red"></p>
                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label th:for="soLuongThanhVien">Sô lượng thành viên</label>
                                                <input style="border-radius: 30px"
                                                       class="form-control" type="text"
                                                       th:field="*{soLuongThanhVien}"/>
                                                <p th:errors="*{soLuongThanhVien}" style="color: red"></p>
                                            </div>
                                            <br>
                                            <div class="form-group">
                                                <label th:for="ngayLapHoKhau">Ngày Lập hộ khẩu</label>
                                                <input style="border-radius: 30px"
                                                       class="form-control" type="text"
                                                       th:field="*{ngayLapHoKhau}"/>
                                                <p th:errors="*{ngayLapHoKhau}" style="color: red"></p>
                                            </div>
                                            <br>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label th:for="diaChi">Địa chỉ nhà</label>
                                                <input  style="border-radius: 30px" class="form-control"
                                                       type="text"
                                                       th:field="*{diaChi}"/>
                                                <p th:errors="*{diaChi}" style="color: red"></p>

                                            </div>
                                            <br>
                                        </div>
                                    </div>
                                    <br>
                                    <button type="submit" class="btn btn-outline-success">Submit</button>
                                </div>
                            </form>

                        </div>
                    </div>

                </div>

                <div></div>

            </div>
            <div class="col-lg-1"></div>
        </div>

    </div>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>

</html>
