<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>

<h3>Add Product</h3>
<p>
    <a th:href="@{/blog}">
        Back to product list
    </a>
</p>
<div>
    <p style="color: blue" th:text="${mess}"></p>
</div>
<div id="form">
    <form th:action="@{/blog/save}" th:object="${blogDto}"
          method="post" novalidate="novalidate">
        <input type="hidden" th:field="*{id}"/>
        <div>
            <label>Blog Name</label>
            <input type="text" th:field="*{name}"/>
            <p th:errors="*{name}" style="color: red"></p>

        </div>
        <div>
            <label>Blog Content</label>
            <textarea type="text" th:field="*{contentBlog}"/>
            <p th:errors="*{contentBlog}" style="color: red"></p>
        </div>
        <div>
            <label>Producer Blog</label>
            <input type="text" th:field="*{producerBlog}"/>
            <p th:errors="*{producerBlog}" style="color: red"></p>

        </div>
        <div>
            <label>Date Create</label>
            <input type="date" th:field="*{dateCreate}"/>
            <p th:errors="*{dateCreate}" style="color: red"></p>
        </div>
        <div>
            <label for="category">Category</label>
            <select id="category" th:field="*{category}">
                <option th:each="category : ${categoryList}"
                        th:value="${category.id}"
                        th:text="${category.name}"></option>
            </select>
            <!--            <select th:field="*{category.id}">-->
            <!--                <option th:value="1" th:text="'Truyện Ngắn'"></option>-->
            <!--                <option th:value="2" th:text="'Tiểu Thuyết'"></option>-->
            <!--                <option th:value="3" th:text="'Truyện Dài'"></option>-->
            <!--            </select>-->
        </div>
        <input type="submit" value="Save"/>
    </form>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</html>
