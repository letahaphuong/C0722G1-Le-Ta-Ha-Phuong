<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head ><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous"></head>
<body>
<h3>Edit product</h3>
<p>
    <a th:href="@{/blog}">
        Back to product list
    </a>
</p>
<p th:if="${mess}" style="color: blue">
</p>
<div id="form">
    <form action="#" th:action="@{/blog/update}" th:object="${blog}"
          method="POST" novalidate="novalidate">
        <input type="hidden" th:field="*{id}"/>
        <div>
            <label>Blog Name</label>
            <input readonly type="text" th:field="*{name}"/>
        </div>
        <div>
            <label>Blog Content</label>
            <input readonly type="email" th:field="*{contentBlog}"/>
        </div>
        <div>
            <label>Producer Blog</label>
            <input readonly type="text" th:field="*{producerBlog}"/>
        </div>
        <div>
            <label>Date Create</label>
            <input readonly type="text" th:field="*{dateCreate}"/>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
