<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Furama-Danh sach customer</title>
    <link rel="stylesheet" href="/static/css/mystyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
          crossorigin="anonymous">

</head>
<body>
<form th:action="@{/film/save}" th:object="${filmList}" method="post">
    <div class="form-content">
        <div class="row">
            <div class="row">
                <div hidden class="form-group">
                    <label>Mã Phim</label>
                    <input class="form-control" name="id" placeholder="CUSTOMER ID *"
                           th:field="*{showTimeId}"/>
                </div>
                <br>
                <div class="form-group">
                    <label for="name">Ngày Chiếu</label>
                    <input required id="name" style="border-radius: 30px" class="form-control" type="datetime-local"
                           min=""
                           th:field="*{dateShow}"/>
                    <p th:errors="*{dateShow}" class="text-danger"></p>
                </div>
                <br>
                <div class="form-group">
                    <label for="dateOfBirth">Số Lượng</label>
                    <input required id="dateOfBirth" style="border-radius: 30px" class="form-control" type="number"
                           min="0"
                           th:field="*{quantity}"/>
                    <p th:errors="*{quantity}" style="color: red"></p>
                </div>
                <br>
                <div class="form-group">
                    <label>Tên Phim</label>
                    <select required id="customerType" th:field="*{filmName}" class="form-select"
                            aria-label="Default select example"
                            style="border-radius: 30px">
                        <option th:each="film : ${filmNameList}"
                                th:value="${film.id}"
                                th:text="${film.filmNameType}">
                        </option>
                    </select>
                </div>
                <br>
            </div>
        </div>
        <br>
        <button type="submit" class="btn btn-outline-success">Submit</button>
    </div>
</form>
</body>
</html>
