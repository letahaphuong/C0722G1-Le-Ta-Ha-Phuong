<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>

<h3>Add Product</h3>
<p>
    <a th:href="@{/user}">
        Back to product list
    </a>
</p>
<div>
    <p style="color: blue" th:text="${mess}"></p>
</div>
<div id="form">
    <form th:action="@{/user/save}" th:object="${userDto}"
          method="post" novalidate="novalidate">
        <input type="hidden" th:field="*{id}"/>
        <div>
            <label>First Name</label>
            <input type="text" th:field="*{firstName}"/>
            <p th:errors="*{firstName}" style="color: red"></p>
        </div>
        <div>
            <label>Last Name</label>
            <input  type="text" th:field="*{lastName}"/>
            <p th:errors="*{lastName}" style="color: red"></p>
        </div>
        <div>
            <label>Age</label>
            <input type="text" th:field="*{age}"/>
            <p th:errors="*{age}" style="color: red"></p>
        </div>
        <div>
            <label>Phone Number</label>
            <input type="text" th:field="*{phoneNumber}"/>
            <p th:errors="*{phoneNumber}" style="color: red"></p>
        </div>
        <div>
            <label>Email</label>
            <input type="text" th:field="*{email}"/>
            <p th:errors="*{email}" style="color: red"></p>
        </div>

        <input type="submit" value="Save"/>
    </form>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</html>
