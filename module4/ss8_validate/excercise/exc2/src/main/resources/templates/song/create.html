<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>

<h3>Add Product</h3>
<p>
    <a th:href="@{/song}">
        Back to product list
    </a>
</p>
<div>
    <p style="color: blue" th:text="${mess}"></p>
</div>
<div id="form">
    <form th:action="@{/song/save}" th:object="${song}"
          method="post" novalidate="novalidate">
        <input type="hidden" th:field="*{id}"/>
        <div>
            <label>Tên Bài Hát</label>
            <input type="text" th:field="*{songName}"/>
            <p th:errors="*{songName}" style="color: red"></p>
        </div>
        <div>
            <label>Ca Sỹ</label>
            <input  type="text" th:field="*{singer}"/>
            <p th:errors="*{singer}" style="color: red"></p>
        </div>
        <div>
            <label>Thể Loại</label>
            <input type="text" th:field="*{category}"/>
            <p th:errors="*{category}" style="color: red"></p>
        </div>

        <input type="submit" value="Save"/>
    </form>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</html>
