
<!-- Modal -->
<div class="modal fade" id="delete" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="staticBackdropLabel">Xoá</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>Bạn có chắc muốn xóa thông tin của sản phẩm này không?</p>
        <span style="color: red"> Mã Lô Hàng : {{loHang.maLoHang}}</span>
        <br>
        <span style="color: red"> Tên Sản Phẩm : {{loHang.tenSanPham}}</span>
        <br>
        <span style="color: red"> Ngày Nhập Hàng : {{loHang.ngayNhap | date: 'dd/MM/yyyy'}}</span>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Thoát</button>
        <button (click)="delete()" type="button" class="btn btn-primary" data-bs-dismiss="modal">Xoá</button>
      </div>
    </div>
  </div>
</div>
